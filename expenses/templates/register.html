{% extends "base.html" %}

{% block title %}Register — ContriKar{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">👋</span>
            <h1>Welcome!</h1>
            <p class="auth-subtitle">Let's get you set up in seconds</p>
        </div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="employee_id">Employee ID</label>
                <input
                    type="text"
                    id="employee_id"
                    name="employee_id"
                    value="{{ prefill_eid }}"
                    placeholder="Your employee ID"
                    required
                >
            </div>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="e.g. Rahit Kumar"
                    autofocus
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="auth-footer">
            Already registered? <a href="{% url 'login' %}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
